<div class="payment-container">
  <div class="payment-card">
    <div class="header">
      <h2>Complete Payment</h2>
      <div class="methods">
        <button class="tab" [class.active]="method==='upi'" (click)="setMethod('upi')">UPI</button>
        <button class="tab" [class.active]="method==='card'" (click)="setMethod('card')">Card</button>
      </div>
    </div>

    <div class="content" *ngIf="method==='upi'">
      <label class="label" for="upiId">UPI ID</label>
      <input id="upiId" class="input" placeholder="example@upi" [(ngModel)]="upi.id">
      <div class="hint">Pay using any UPI app (GPay, PhonePe, Paytm, BHIM)</div>
    </div>

    <div class="content" *ngIf="method==='card'">
      <label class="label" for="cardName">Name on card</label>
      <input id="cardName" class="input" placeholder="Full name" [(ngModel)]="card.name">

      <label class="label" for="cardNumber">Card number</label>
      <input id="cardNumber" class="input" placeholder="1234 5678 9012 3456" [(ngModel)]="card.number" (input)="formatCardNumber()">

      <div class="row">
        <div class="col">
          <label class="label" for="expiry">Expiry (MM/YY)</label>
          <input id="expiry" class="input" placeholder="MM/YY" [(ngModel)]="card.expiry">
        </div>
        <div class="col">
          <label class="label" for="cvv">CVV</label>
          <input id="cvv" class="input" placeholder="***" [(ngModel)]="card.cvv" type="password" maxlength="4">
        </div>
      </div>
    </div>

    <div class="footer">
      <button class="pay-btn" [disabled]="isProcessing" (click)="submit()">
        {{ isProcessing ? 'Processing…' : 'Pay Now' }}
      </button>
    </div>
  </div>
</div>
